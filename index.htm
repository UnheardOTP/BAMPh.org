<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAMPh, A drunken brotherhood</title>
    <meta name="description" content="BAMPh, A drunken brotherhood.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,800;0,900;1,300&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --text-color: #e2e8f0;
            --accent-color: #ffb703;
            /* Elegant warm gold */
            --accent-glow: rgba(255, 183, 3, 0.12);
            --transition-speed: 0.6s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at center, rgba(18, 18, 24, 0.8) 0%, var(--bg-color) 75%),
                radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle atmospheric background light grid/dots for premium feel */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            animation: containerEntry 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            box-shadow:
                0 30px 70px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .image-wrapper {
            position: relative;
            margin-bottom: 3rem;
            transition: transform var(--transition-speed) cubic-bezier(0.16, 1, 0.3, 1);
        }

        .image-wrapper:hover {
            transform: scale(1.04) translateY(-8px);
        }

        /* Soft gold glow pulsing behind the image */
        .image-wrapper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 85%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
            border-radius: 50%;
            filter: blur(25px);
            animation: pulseGlow 6s infinite alternate ease-in-out;
        }

        .logo {
            max-width: 280px;
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.9));
            transition: filter var(--transition-speed) ease;
        }

        .image-wrapper:hover .logo {
            filter: drop-shadow(0 25px 45px rgba(0, 0, 0, 0.95)) brightness(1.05);
        }

        .tagline {
            text-align: center;
            position: relative;
            padding-top: 0.5rem;
        }

        .brand-name {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 3.8rem;
            font-weight: 900;
            letter-spacing: 0.35em;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1), 0 4px 12px rgba(0, 0, 0, 0.9);
            margin-right: -0.35em;
            /* Compensate for letter-spacing on the last character */
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff 40%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tag-text {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 300;
            color: var(--accent-color);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-right: -0.4em;
            /* Compensate for letter-spacing */
            opacity: 0.9;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
            padding-bottom: 1.5rem;
        }

        /* Sleek decorative line under the tagline */
        .tag-text::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 35%;
            width: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-color), transparent);
            opacity: 0.5;
            transition: width 0.8s ease;
        }

        .container:hover .tag-text::after {
            width: 50%;
            left: 25%;
        }

        /* Screen reader friendly comma for exact textual content match */
        .sr-only-comma {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        @keyframes containerEntry {
            from {
                opacity: 0;
                transform: scale(0.97) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes pulseGlow {
            0% {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 1;
            }
        }

        /* Ambient floating dust effect for immersive experience */
        .ambient-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 183, 3, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>

<body>
    <!-- Ambient gold floating orbs -->
    <div class="ambient-particle" style="width: 300px; height: 300px; top: 10%; left: -100px;"></div>
    <div class="ambient-particle" style="width: 400px; height: 400px; bottom: -150px; right: -150px;"></div>

    <main class="container">
        <div class="image-wrapper">
            <img src="sammyl.png" alt="BAMPh crest representing the drunken brotherhood" class="logo">
        </div>
        <h1 class="tagline">
            <span class="brand-name">BAMPh</span>
            <span class="sr-only-comma">,</span>
            <span class="tag-text">A drunken brotherhood</span>
        </h1>
    </main>

    <audio id="hover-sound" src="bitch.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.logo');
            const sound = document.getElementById('hover-sound');

            if (logo && sound) {
                // Play audio on mouse enter
                logo.addEventListener('mouseenter', () => {
                    sound.currentTime = 0;
                    sound.play().catch(error => {
                        console.warn("Audio play blocked by browser policy. Interaction is required first:", error);
                    });
                });
            }
        });
    </script>
</body>

</html>
